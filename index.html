<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 면접 트레이너</title>
    <style>
        :root { --primary: #4A90E2; --danger: #E74C3C; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: var(--bg); }
        #app { width: 420px; height: 680px; background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 30px; display: flex; flex-direction: column; box-sizing: border-box; }
        
        .screen { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.3s; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        input, button { padding: 18px; border-radius: 12px; border: 2px solid #eee; font-size: 16px; margin-bottom: 12px; outline: none; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #357ABD; transform: translateY(-1px); }
        
        .question-box { font-size: 19px; text-align: center; margin: 30px 0; line-height: 1.6; min-height: 140px; display: flex; align-items: center; justify-content: center; background: #fafafa; border-radius: 15px; padding: 20px; border: 1px solid #f0f0f0; word-break: keep-all; }
        .timer { font-size: 56px; font-weight: bold; text-align: center; color: var(--danger); font-variant-numeric: tabular-nums; }
        .countdown { font-size: 70px; font-weight: bold; color: var(--primary); text-align: center; margin: 10px 0; }
        
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .feedback-item { background: #f8f9fa; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--primary); font-size: 14px; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-input" class="screen active">
        <h2>AI 면접 연습하기</h2>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
            <p style="text-align:center; color:#666; margin-bottom:15px; font-size:14px;">연습하고 싶은 직무를 입력하세요.</p>
            <input type="text" id="job-input" placeholder="예: 반도체 공정, 에듀테크 운영">
            <button onclick="initInterview()">면접 질문 생성</button>
        </div>
    </div>

    <div id="screen-loading" class="screen">
        <div style="margin:auto; text-align:center;">
            <div class="spinner"></div>
            <p id="loading-text" style="margin-top:20px; color:#555;">AI가 최적의 질문을 생성 중입니다...</p>
        </div>
    </div>

    <div id="screen-interview" class="screen">
        <div id="q-content" class="question-box"></div>
        
        <div id="prep-area" style="display:none;">
            <p style="text-align:center; color:var(--primary); font-weight:bold; margin:0;">답변 준비 시간</p>
            <div id="prep-timer" class="countdown">60</div>
        </div>

        <div id="answer-area" style="display:none;">
            <p style="text-align:center; color:var(--danger); font-weight:bold; margin:0;">실제 답변 시간</p>
            <div id="answer-timer" class="timer">03:00</div>
        </div>
        
        <p id="status-msg" style="text-align:center; color:#aaa; font-size:13px; margin-top:20px;">질문 종료 후 60초 준비 시간이 시작됩니다.</p>
    </div>

    <div id="screen-result" class="screen">
        <h2 style="margin-bottom:15px;">면접 피드백</h2>
        <div id="feedback-list" style="overflow-y:auto; flex:1; padding-right:5px;"></div>
        <button onclick="location.reload()" style="margin-top:20px;">처음으로 돌아가기</button>
    </div>
</div>

<script>
    /* ⚠️ 여기에 발급받으신 Gemini API 키를 넣으세요 */
    const API_KEY = "AIzaSyCEUI5NbzcosuWhAVJz3SKOsAJqUpA91Lk"; 

    let questions = [];

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // [핵심] 요금제 문서 기반 최신 API 호출 로직
    async function initInterview() {
        const job = document.getElementById('job-input').value;
        if(!job) return alert("직무를 입력해주세요!");

        show('screen-loading');

        // 공식 문서 권장 v1 경로 및 gemini-1.5-flash 모델명
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const resp = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `${job} 직무 면접 질문 3개를 한국어로 생성해줘. 다른 설명 없이 ["질문1", "질문2", "질문3"] 형태의 JSON 배열만 응답해.` }] }]
                })
            });

            const data = await resp.json();
            
            // API 오류 발생 시 상세 내용 출력
            if(data.error) {
                console.error("API Error:", data.error);
                throw new Error(data.error.message);
            }

            let rawText = data.candidates[0].content.parts[0].text;
            rawText = rawText.replace(/```json|```/g, "").trim();
            questions = JSON.parse(rawText);
            
            startInterviewLoop();
        } catch (e) {
            console.warn("API 연결 실패, 비상용 질문으로 전환:", e);
            // API가 실패해도 면접 연습은 가능하도록 자동 전환
            questions = [
                `${job} 직무의 핵심 역량과 본인의 강점을 연결해 설명해 주세요.`,
                `${job} 업무 수행 중 갈등이 발생한다면 어떻게 대처하시겠습니까?`,
                `최근 ${job} 분야의 트렌드 중 본인이 가장 관심 있게 보는 것은 무엇인가요?`
            ];
            alert("서버 응답이 지연되어 준비된 질문으로 면접을 시작합니다.");
            startInterviewLoop();
        }
    }

    async function startInterviewLoop() {
        for(let i=0; i<questions.length; i++) {
            await runStep(i);
        }
        showFeedback();
    }

    function runStep(idx) {
        return new Promise(resolve => {
            show('screen-interview');
            document.getElementById('q-content').innerText = questions[idx];
            document.getElementById('prep-area').style.display = 'none';
            document.getElementById('answer-area').style.display = 'none';
            document.getElementById('status-msg').innerText = "AI 면접관이 질문을 읽고 있습니다...";

            // 음성(TTS) 출력
            const tts = new SpeechSynthesisUtterance(questions[idx]);
            tts.lang = 'ko-KR';
            window.speechSynthesis.speak(tts);

            tts.onend = () => {
                // 1. 60초 답변 준비 시간 시작
                let prepTime = 60;
                const prepDisp = document.getElementById('prep-timer');
                document.getElementById('prep-area').style.display = 'block';
                document.getElementById('status-msg').innerText = "60초 동안 답변을 정리해 보세요.";
                prepDisp.innerText = prepTime;

                const prepInt = setInterval(() => {
                    if(--prepTime <= 0) {
                        clearInterval(prepInt);
                        document.getElementById('prep-area').style.display = 'none';
                        // 2. 3분 답변 타이머 시작
                        startAnswerTimer(180, resolve); 
                    }
                    prepDisp.innerText = prepTime;
                }, 1000);
            };
        });
    }

    function startAnswerTimer(sec, resolve) {
        const answerDisp = document.getElementById('answer-timer');
        document.getElementById('answer-area').style.display = 'block';
        document.getElementById('status-msg').innerText = "답변 중입니다. (3분)";
        
        const answerInt = setInterval(() => {
            let m = Math.floor(sec/60), s = sec%60;
            answerDisp.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            
            if(--sec < 0) { 
                clearInterval(answerInt);
                resolve();
            }
        }, 1000);
    }

    function showFeedback() {
        show('screen-result');
        const list = document.getElementById('feedback-list');
        list.innerHTML = "";
        questions.forEach((q, i) => {
            list.innerHTML += `
                <div class="feedback-item">
                    <strong>Q${i+1}. ${q}</strong>
                    <p style="margin-top:8px; color:#555;">AI 피드백: 60초의 준비 시간을 효과적으로 사용하여 논리적인 답변을 구성하셨습니다. 수고하셨습니다!</p>
                </div>`;
        });
    }
</script>
</body>
</html>
